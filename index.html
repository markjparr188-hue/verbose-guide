<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Maths & Physics Quiz</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" ></script>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100dvh;
    margin: 0;
    padding: 15px;
    background: #0f2027;
    font-family: Arial, sans-serif;
    color: #fff;
    overflow-x: hidden;
    position: relative;
}
canvas.backgroundAtoms, canvas.confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}
canvas.backgroundAtoms { z-index: 0; }
canvas.confetti { z-index: 10; }
.quiz-container {
    background: rgba(15,32,39,0.9);
    border: 3px solid #66ccff;
    border-radius: 12px;
    max-width: 900px;
    width: 100%;
    width: min(900px, 95%);
    min-height: calc(100vh - 30px);

    padding: 25px;
    box-sizing: border-box;

    box-shadow: 0 0 20px rgba(0,0,0,0.6);

    position: relative;
    z-index: 5;

    display: flex;
    flex-direction: column;
}
h1 { text-align: center; color: #66ccff; margin-top: 2px; margin-bottom: 4px;  font-size: 32px; }
.select-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 10px;      /* new spacing from top */
    margin-bottom: 6px;
}

select, input, textarea {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 2px solid #66ccff;
    background: rgba(15,32,39,0.9);
    color: #fff;
    font-size: 18px;
    box-sizing: border-box;
}

#answerInput {
    width: 100%;          /* full width of its parent */
    box-sizing: border-box; /* include padding in width */
    padding: 10px;
    font-size: 20px;
    border-radius: 6px;
    border: 2px solid #66ccff;
    background: rgba(15,32,39,0.9);
    color: #fff; 
    resize: none;
    overflow: hidden;
}

.input-row { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 8px; }
.question-box {
    flex-grow:1;
    background: rgba(255,255,255,0.1);
    border: 2px solid #66ccff;
    border-radius: 6px;
    padding: 10px;
    margin: 10px 0;
    min-height: 60px;
    font-size: 20px;
	line-height: 1.5;
    word-wrap: break-word;
}
.button-row {
    display: flex; justify-content: center; gap: 12px; margin-top: 12px;
}
.button-row button {
    flex: 1; max-width: 200px; padding: 10px; border: none; border-radius: 6px;
    font-size: 14px; font-weight: bold; cursor: pointer;
}
.primary { background: #ffcc00; color: #000; }
.secondary { background: #66ccff; color: #000; }
.math-preview {
    margin-top: 6px;
    padding: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid #66ccff;
    border-radius: 6px;
    text-align: center;
    min-height: 24px;
}
.symbol-toolbar { display: grid; grid-template-columns: repeat(10,1fr); gap: 6px; margin: 10px 0; }

@media (max-width: 600px) {
    .symbol-toolbar {
        grid-template-columns: repeat(8, minmax(0, 1fr)); /* forces 8 columns without wrapping */
        gap: 3px;   /* smaller gap to fit screen */
        margin: 4px 0;
    }

    .symbol-toolbar button {
        padding: 6px;     /* smaller buttons */
        font-size: 14px;  /* smaller font */
        border-radius: 4px;
    }
}
.symbol-btn {
    background: #66ccff;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 11px;        /* bigger button size */
    font-size: 18px;      /* bigger numbers & symbols */
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
}
.symbol-btn:hover {
    background: #ffcc00;
    transform: scale(1.05);
}
#feedback { margin-top: 10px; font-weight: bold; text-align: center; font-size: 24px; }
#hintBtn { margin-top: 6px; text-align: center; cursor: pointer; color: #ffcc00; text-decoration: underline; }
#keyboardToggle { margin-top: 12px; width: 100%; background: #ffcc00; color: #000; border: none; border-radius: 6px; padding: 14px; font-weight: bold; cursor: pointer; }
.progress-container { width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 12px; }
.progress-bar-inner { width: 0%; height: 24px; background: #ffcc00; border-radius: 10px; transition: width 0.3s; }
#score { text-align: center; margin-top: 6px; font-size: 14px; color: #66ccff; }
@media screen and (max-width:700px){
    .quiz-container{ width:95%; padding:15px; }
    .select-row{ grid-template-columns: 1fr; }
    .input-row{
    grid-template-columns: 1fr;
    width: 100%;
   }
}
/* Add new adjustments for smaller phones */
@media screen and (max-width:600px) {
    .quiz-container {
        width: 95%;
        padding: 10px;
        max-height: 95vh;
        overflow-y: auto;
    }

    h1 {
        font-size: 24px;
        margin-bottom: 2px;
    }
	
	.select-row select {
    font-size: 18px;      /* smaller text */
    padding: 6px 6px;     /* less padding */
    }
    .select-row {
    gap: 6px;             /* reduce gap between dropdowns */
    }

    #answerInput {
        font-size: 18px;
        padding: 8px;
    }

    .math-preview {
        font-size: 18px;
        padding: 6px;
    }

    .input-row {
        gap: 6px;
    }

    .symbol-toolbar {
        gap: 3px;
        margin: 4px 0;
        font-size: 14px;
    }

    .symbol-btn {
        padding: 6px;
        font-size: 14px;
    }

    #keyboardToggle {
        padding: 6px;
        font-size: 10px;
    }

    .button-row button {
        font-size: 12px;
        padding: 6px;
    }
	
	#feedback {
    font-size: 16px;   /* smaller text on mobile */
    line-height: 1.3;  /* keep it readable */
    }

    #hintBtn {
        font-size: 16px;
        margin-top: 4px;
    }

    .progress-bar-inner {
        height: 10px;
    }

    #score {
        font-size: 12px;
    }
}

</style>
</head>
<body>
<canvas class="backgroundAtoms" id="atomsCanvas"></canvas>
<canvas class="confetti" id="confettiCanvas"></canvas>

<div class="quiz-container">
<h1>GCSE Maths Quiz</h1>
<div class="select-row">
    <select id="subjectSelect"><option value="">Subject</option></select>
    <select id="topicSelect"><option value="">Topic</option></select>
    <select id="difficultySelect">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>
</div>
<div id="questionBox" class="question-box">Select options above and type your answer.</div>
<div class="input-row">
    <textarea id="answerInput" placeholder="Type your answer..." rows="1" readonly></textarea>  
</div>
<div class="math-preview">
Preview: <span id="mathPreviewContent">\( \)</span>
</div>
<button id="keyboardToggle">Math Keyboard On/Off</button>
<div id="symbolToolbar" class="symbol-toolbar">
  <button class="symbol-btn" data-symbol="0">0</button>
  <button class="symbol-btn" data-symbol="1">1</button>
  <button class="symbol-btn" data-symbol="2">2</button>
  <button class="symbol-btn" data-symbol="3">3</button>
  <button class="symbol-btn" data-symbol="4">4</button>
  <button class="symbol-btn" data-symbol="5">5</button>
  <button class="symbol-btn" data-symbol="6">6</button>
  <button class="symbol-btn" data-symbol="7">7</button>
  <button class="symbol-btn" data-symbol="8">8</button>
  <button class="symbol-btn" data-symbol="9">9</button>

  <!-- Basic symbols -->
  <button class="symbol-btn" data-symbol="+">+</button>
  <button class="symbol-btn" data-symbol="−">−</button>
  <button class="symbol-btn" data-symbol="×">×</button>
  <button class="symbol-btn" data-symbol="÷">÷</button>
  <button class="symbol-btn" data-symbol="x">X</button>
  <button class="symbol-btn" data-symbol="y">Y</button>
  <button class="symbol-btn" data-symbol="a">a</button>
  <button class="symbol-btn" data-symbol="b">b</button>
  <button class="symbol-btn" data-symbol="c">c</button>
  <button class="symbol-btn" data-symbol="n">n</button>
  <button class="symbol-btn" data-symbol="<">&lt;</button>
  <button class="symbol-btn" data-symbol=">">&gt;</button>
  <button class="symbol-btn" data-symbol="≤">≤</button>
  <button class="symbol-btn" data-symbol="≥">≥</button>
  <button class="symbol-btn" data-symbol="."><b>.</b></button>
  <button class="symbol-btn" data-symbol=":"><b>:</b></button>

  <!-- Templates -->
  <button class="symbol-btn" data-template="sqrt">√</button>
  <button class="symbol-btn" data-template="power">x²</button>
  <button class="symbol-btn" data-template="fraction">a/b</button>
  <button class="symbol-btn" data-symbol="π">π</button>
  <button class="symbol-btn" data-symbol="°">°</button>
  <button class="symbol-btn" data-symbol="sin()">sin</button>
  <button class="symbol-btn" data-symbol="cos()">cos</button>
  <button class="symbol-btn" data-symbol="tan()">tan</button>
  <button class="symbol-btn" data-symbol="()">()</button>
  <button class="symbol-btn" data-symbol="%">%</button>
  <button class="symbol-btn" data-symbol="=">=</button>
  <button class="symbol-btn" data-symbol="^">^</button>
  <button class="symbol-btn" data-template="scientific">10^x</button>
  
  <!-- Backspace (replaces =) -->
  <button class="symbol-btn" id="backspaceBtn">⌫</button>
</div>
<div class="button-row">
    <button id="submitBtn" class="primary">Submit Answer</button>
    <button id="nextBtn" class="secondary">Next Question</button>
</div>
<div id="feedback"></div>
<div id="hintBtn">Show Hint</div>
<div class="progress-container"><div class="progress-bar-inner" id="progressBar"></div></div>
<div id="score"></div>
</div>

  { q: "A bag has 4 red and 6 blue balls. Two are picked with replacement. Find P(red then red).", answer: "0.16", difficulty: "medium", tip: "Independent events", solution: "P = \\(0.4 \\times 0.4 = 0.16\\)" },
  { q: "A spinner has 5 equal sections. Find P(not landing on a chosen section).", answer: "1/5 0.8", difficulty: "medium", tip: "Use complement", solution: "P = \\(1-\\frac{1}{5}=0.8\\)" },
  { q: "A bag has 2 red and 8 blue balls. Find P(red).", answer: "2/10 0.2", difficulty: "medium", tip: "Red ÷ total", solution: "P(red) = \\(\\frac{2}{10}=0.2\\)" },
  { q: "Two coins are flipped. Find P(at least one head).", answer: "3/4 0.75", difficulty: "medium", tip: "Use complement", solution: "P = \\(1-0.25=0.75\\)" },
  { q: "A die is rolled. Find P(number less than 5).", answer: "4/6 0.6667", difficulty: "medium", tip: "Numbers 1–4", solution: "P = \\(\\frac{4}{6}=0.6667\\)" },

  // ===== Hard (41–60) =====
  { q: "A bag has 5 red and 7 blue balls. Two are picked without replacement. Find P(red then red).", answer: "0.1515", difficulty: "hard", tip: "Probabilities change", solution: "P = \\(\\frac{5}{12}\\times\\frac{4}{11}\\approx0.1515\\)" },
  { q: "Two fair dice are rolled. Find P(sum equals 7).", answer: "0.1667", difficulty: "hard", tip: "Count favourable outcomes", solution: "P = \\(\\frac{6}{36}=0.1667\\)" },
  { q: "A bag contains 3 red, 4 blue, 5 green. Find P(green).", answer: "0.4167", difficulty: "hard", tip: "Green ÷ total", solution: "P = \\(\\frac{5}{12}\\approx0.4167\\)" },
  { q: "Two coins are flipped. Find P(exactly one head).", answer: "1/2 0.5", difficulty: "hard", tip: "List outcomes", solution: "P = \\(\\frac{2}{4}=0.5\\)" },
  { q: "A die is rolled twice. Find P(two sixes).", answer: "0.0278", difficulty: "hard", tip: "Multiply", solution: "P = \\(\\frac{1}{36}\\approx0.0278\\)" },
  { q: "A bag has 6 red and 4 blue balls. One is removed without replacement, then another. Find P(both blue).", answer: "0.1333", difficulty: "hard", tip: "Adjust totals", solution: "P = \\(\\frac{4}{10}\\times\\frac{3}{9}=0.1333\\)" },
  { q: "A spinner numbered 1–10 is fair. Find P(number greater than 7).", answer: "3/10 0.3", difficulty: "hard", tip: "Count favourable", solution: "P = \\(\\frac{3}{10}=0.3\\)" },
  { q: "A bag has 9 red and 3 blue balls. Find P(blue then red without replacement).", answer: "0.2045", difficulty: "hard", tip: "Multiply changing probabilities", solution: "P = \\(\\frac{3}{12}\\times\\frac{9}{11}\\approx0.2045\\)" }
]
}
};

let currentList=[], currentIndex=0, score=0;
const maxHighScoreKey='gcse_quiz_highscore';
const subjectSelect=document.getElementById("subjectSelect");
const topicSelect=document.getElementById("topicSelect");
const difficultySelect=document.getElementById("difficultySelect");
const questionBox=document.getElementById("questionBox");
const answerInput=document.getElementById("answerInput");
const unitInput=document.getElementById("unitInput");

answerInput.addEventListener("input", function(){
    this.style.height = "auto";
    this.style.height = this.scrollHeight + "px";
});
const feedback=document.getElementById("feedback");
const hintBtn=document.getElementById("hintBtn");
const submitBtn=document.getElementById("submitBtn");
const nextBtn=document.getElementById("nextBtn");
const scoreDiv=document.getElementById("score");
const progressBar=document.getElementById("progressBar");
const mathPreviewContent=document.getElementById("mathPreviewContent");
const toolbar=document.getElementById("symbolToolbar");
const keyboardToggle=document.getElementById("keyboardToggle");
const confettiCanvas = document.getElementById("confettiCanvas");
const confettiCtx = confettiCanvas.getContext("2d");

function resizeConfettiCanvas(){
    const dpr = window.devicePixelRatio || 1;

    confettiCanvas.width = window.innerWidth * dpr;
    confettiCanvas.height = window.innerHeight * dpr;

    confettiCanvas.style.width = window.innerWidth + "px";
    confettiCanvas.style.height = window.innerHeight + "px";

    confettiCtx.setTransform(dpr,0,0,dpr,0,0);
}

resizeConfettiCanvas();

window.addEventListener("resize", resizeConfettiCanvas);
window.addEventListener("orientationchange", resizeConfettiCanvas);

let confettiParticles=[];

// ---------- DROPDOWNS ----------
function populateSubjects(){
    subjectSelect.innerHTML='<option value="">Subject</option>';
    Object.keys(QUESTIONS).forEach(sub=>{
        const o=document.createElement("option"); o.value=sub; o.textContent=sub;
        subjectSelect.appendChild(o);
    });
}
subjectSelect.addEventListener("change",()=>{
    topicSelect.innerHTML='<option value="">Topic</option>';
    const sub=subjectSelect.value;
    if(!sub) return;
    Object.keys(QUESTIONS[sub]).forEach(topic=>{
        const o=document.createElement("option"); o.value=topic; o.textContent=topic;
        topicSelect.appendChild(o);
    });
    loadQuestions();
});
topicSelect.addEventListener("change",loadQuestions);
difficultySelect.addEventListener("change",loadQuestions);
populateSubjects();

// ---------- LOAD & SHOW ----------
function loadQuestions(){
    const sub = subjectSelect.value;
    const topic = topicSelect.value;
    const diff = difficultySelect.value;
    if(!sub||!topic||!diff){ questionBox.textContent="Select subject, topic, and difficulty."; return; }
    currentList = QUESTIONS[sub][topic].filter(q=>q.difficulty===diff);
    currentIndex=0; score=0; updateScore();
    showQuestion();
}
function showQuestion() {
    if (!currentList.length) {
        questionBox.textContent = "No questions found.";
        return;
    }

    const q = currentList[currentIndex];

    // Insert the question HTML
    questionBox.innerHTML = q.q;

    // Clear answer
    answerInput.value = "";

    // Reset feedback and enable submit
    feedback.innerHTML = "";
    submitBtn.disabled = false;

    // Ensure MathJax renders dynamically
    if (window.MathJax) {
        MathJax.typesetPromise([questionBox])
            .catch((err) => console.log("MathJax rendering error:", err.message));
    }

    // Update progress bar
    updateProgress();
}

// ---------- NORMALIZE & CHECK ----------
function normalize(str){
    if(!str) return "";
    str = str.trim().toLowerCase().replace(/\s+/g,"");
    str = str.replace(/÷/g,"/").replace(/×/g,"*").replace(/−/g,"-");
    return str;
}
function numericEqual(user,correct,tol=0.01){
    const u=parseFloat(user), c=parseFloat(correct);
    if(!isNaN(u)&&!isNaN(c)) return Math.abs(u-c)<=tol;
    return user===correct;
}

// ---------- SUBMIT ----------
submitBtn.onclick = function(){
    const q = currentList[currentIndex];

    // Get user answer and normalize
    let userAnswer = normalize(answerInput.value);

    // Convert LaTeX fractions \frac{a}{b} to numeric a/b
    userAnswer = userAnswer.replace(/\\frac\{(\d+)\}\{(\d+)\}/g, "$1/$2");

    // Check if the numeric value matches
    const userCorrect = numericEqual(userAnswer, normalize(q.answer));

    // Display feedback
    feedback.innerHTML = userCorrect ? 
        `<span style="color:green;">✓ Correct! ${q.solution}</span>` :
        `<span style="color:red;">✗ Wrong! Correct: ${q.answer}. ${q.solution}</span>`;

    if(userCorrect){ 
        score++; 
        launchConfetti(); 
        submitBtn.disabled = true; 
    }

    updateScore();

    // Re-render MathJax for feedback
    if(window.MathJax) MathJax.typesetPromise([feedback]);
};

// ---------- NEXT ----------
nextBtn.onclick = function(){
    currentIndex++;
    if(currentIndex<currentList.length){ showQuestion(); }
    else{
        questionBox.textContent="Quiz Completed!";
        answerInput.style.display=unitInput.style.display=submitBtn.style.display=nextBtn.style.display="none";
        feedback.innerHTML=`Final Score: ${score} / ${currentList.length}`;
        progressBar.style.width="100%";
        updateHighScore();
    }
};

// ---------- HINT ----------
hintBtn.onclick=()=>{
    const q=currentList[currentIndex];
    feedback.textContent="Hint: "+(q.tip||"");
    feedback.style.color="#ffcc00";
    if(window.MathJax) MathJax.typesetPromise([feedback]);
};

// ---------- SCORE & PROGRESS ----------
function updateScore(){ scoreDiv.textContent=`Score: ${score} / ${currentList.length} | High Score: ${getHighScore()}`; }
function updateProgress(){ progressBar.style.width=(currentIndex/currentList.length*100)+"%"; }
function getHighScore(){ return localStorage.getItem(maxHighScoreKey)||0; }
function updateHighScore(){ if(score>getHighScore()) localStorage.setItem(maxHighScoreKey,score); }

// ---------- MATH PREVIEW ----------
answerInput.addEventListener("input",()=>{
    let val = answerInput.value.trim();
    if(!val){ mathPreviewContent.innerHTML="\\(\\)"; if(window.MathJax) MathJax.typesetPromise([mathPreviewContent]); return; }
    val = val.replace(/÷/g,"/"); 
    val = val.replace(/(\d+)\s*\/\s*(\d+)/g, "\\frac{$1}{$2}");
    val = val.replace(/sqrt\(([^)]+)\)/gi,"\\sqrt{$1}");
    val = val.replace(/\bpi\b/gi,"\\pi");
    val = val.replace(/×/g,"\\cdot ").replace(/−/g,"-");
    mathPreviewContent.innerHTML=`\\(${val}\\)`;
    if(window.MathJax) MathJax.typesetPromise([mathPreviewContent]);
});

// ---------- SYMBOL KEYBOARD ----------
// Insert symbols or templates
function insertAtCursor(text){
    const start = answerInput.selectionStart;
    const end = answerInput.selectionEnd;
    answerInput.value = answerInput.value.slice(0, start) + text + answerInput.value.slice(end);
    answerInput.selectionStart = answerInput.selectionEnd = start + text.length;
    answerInput.focus();
    answerInput.dispatchEvent(new Event('input'));
}

function insertTemplate(type){
    const start = answerInput.selectionStart;
    const end = answerInput.selectionEnd;
    if(type === "fraction"){
        answerInput.value = answerInput.value.slice(0, start) + "\\frac{}{}" + answerInput.value.slice(end);
        answerInput.selectionStart = answerInput.selectionEnd = start + 6;
    } else if(type === "power"){
        answerInput.value = answerInput.value.slice(0, start) + "^2" + answerInput.value.slice(end);
        answerInput.selectionStart = answerInput.selectionEnd = start + 2;
    } else if(type === "sqrt"){
        answerInput.value = answerInput.value.slice(0, start) + "\\sqrt{}" + answerInput.value.slice(end);
        answerInput.selectionStart = answerInput.selectionEnd = start + 6; 
    }else if(type === "scientific"){
    const start = answerInput.selectionStart;
    // Inserts the scientific notation template: "×10^{}"
    answerInput.value = answerInput.value.slice(0,start) + " \\times 10^{}" + answerInput.value.slice(answerInput.selectionEnd);
    // Put cursor inside the exponent
    answerInput.selectionStart = answerInput.selectionEnd = start + 9; 
    }
	
    answerInput.focus();
    answerInput.dispatchEvent(new Event('input'));
}

// Handle all symbol buttons
document.querySelectorAll(".symbol-btn").forEach(btn => {
    btn.onclick = () => {
        if(btn.dataset.template){
            insertTemplate(btn.dataset.template);
        } else if(btn.id !== "backspaceBtn"){
            insertAtCursor(btn.dataset.symbol);
        }
    };
});

// Backspace button
document.getElementById("backspaceBtn").onclick = () => {
    const start = answerInput.selectionStart;
    const end = answerInput.selectionEnd;

    if(start === 0 && end === 0) return;

    if(start !== end){
        // delete selection
        answerInput.value = answerInput.value.slice(0, start) + answerInput.value.slice(end);
        answerInput.selectionStart = answerInput.selectionEnd = start;
    } else {
        // delete one char before cursor
        answerInput.value = answerInput.value.slice(0, start-1) + answerInput.value.slice(end);
        answerInput.selectionStart = answerInput.selectionEnd = start-1;
    }

    answerInput.focus();
    answerInput.dispatchEvent(new Event('input'));
};
keyboardToggle.onclick=()=>{ toolbar.style.display=(toolbar.style.display==="none"||toolbar.style.display==="")?"grid":"none"; };

// ---------- CONFETTI ----------
function launchConfetti(){
    for(let i=0;i<600;i++){ confettiParticles.push({x:Math.random()*confettiCanvas.width,y:Math.random()*confettiCanvas.height-50,r:Math.random()*6+4,d:Math.random()*50+10,color:`hsl(${Math.random()*360},100%,50%)`,tilt:Math.random()*10-10,tiltAngleIncrement:Math.random()*0.07+0.05,tiltAngle:0}); }
    requestAnimationFrame(updateConfetti);
}
function updateConfetti(){
    confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    confettiParticles.forEach(p=>{
        p.tiltAngle+=p.tiltAngleIncrement;
        p.y+=(Math.cos(p.d)+3+p.r/2)/2;
        p.x+=Math.sin(p.d); p.tilt=Math.sin(p.tiltAngle)*15;
        confettiCtx.beginPath();
        confettiCtx.lineWidth=p.r/2;
        confettiCtx.strokeStyle=p.color;
        confettiCtx.moveTo(p.x+p.tilt+p.r/4,p.y);
        confettiCtx.lineTo(p.x+p.tilt,p.y+p.tilt+p.r/4);
        confettiCtx.stroke();
    });
    confettiParticles=confettiParticles.filter(p=>p.y<confettiCanvas.height+50);
    if(confettiParticles.length>0) requestAnimationFrame(updateConfetti);
}

// ---------- ATOMS BACKGROUND ----------
// ---------- ATOMS BACKGROUND ----------

const atomsCanvas = document.getElementById("atomsCanvas");
const ctxAtoms = atomsCanvas.getContext("2d");

let atomsParticles=[];

function resizeAtomsCanvas(){

    const dpr = window.devicePixelRatio || 1;

    atomsCanvas.width = window.innerWidth * dpr;
    atomsCanvas.height = window.innerHeight * dpr;

    atomsCanvas.style.width = window.innerWidth + "px";
    atomsCanvas.style.height = window.innerHeight + "px";

    ctxAtoms.setTransform(dpr,0,0,dpr,0,0);
}

resizeAtomsCanvas();

window.addEventListener("resize", resizeAtomsCanvas);
window.addEventListener("orientationchange", resizeAtomsCanvas);

function initAtoms(){

    atomsParticles=[];

    const particleCount = window.innerWidth < 600 ? 400 : 150;

    for(let i=0;i<particleCount;i++){

        atomsParticles.push({
            x:Math.random()*window.innerWidth,
            y:Math.random()*window.innerHeight,
            r:Math.random()*3+2,
            dx:(Math.random()-0.5)*1.2,
            dy:(Math.random()-0.5)*1.2
        });

    }

}

const maxDist = 120;
const maxDistSq = maxDist * maxDist;

function drawAtoms(){

    ctxAtoms.clearRect(0,0,atomsCanvas.width,atomsCanvas.height);

    for(let i=0;i<atomsParticles.length;i++){

        const p = atomsParticles[i];

        ctxAtoms.beginPath();
        ctxAtoms.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctxAtoms.fillStyle="#66ccff";
        ctxAtoms.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0||p.x>window.innerWidth) p.dx*=-1;
        if(p.y<0||p.y>window.innerHeight) p.dy*=-1;

        for(let j=i+1;j<atomsParticles.length;j++){

            const p2 = atomsParticles[j];

            const dx=p.x-p2.x;
            const dy=p.y-p2.y;

            const distSq=dx*dx+dy*dy;

            if(distSq < maxDistSq){

                const opacity = 1 - distSq/maxDistSq;

                ctxAtoms.strokeStyle=`rgba(102,204,255,${opacity})`;
                ctxAtoms.lineWidth=1;

                ctxAtoms.beginPath();
                ctxAtoms.moveTo(p.x,p.y);
                ctxAtoms.lineTo(p2.x,p2.y);
                ctxAtoms.stroke();

            }

        }

    }

    requestAnimationFrame(drawAtoms);

}

initAtoms();
drawAtoms();
});
